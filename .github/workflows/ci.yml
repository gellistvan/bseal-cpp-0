name: CI

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master

permissions:
  contents: read

jobs:

  # --------------------------------------------------------------------------
  # Linux: ubuntu-latest, Release + sanitizer builds.
  # --------------------------------------------------------------------------
  build-linux:
    name: Build and test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config \
            libsodium-dev libssl-dev \
            qt6-base-dev

      - name: Configure (Release)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBSEAL_BUILD_TESTS=ON \
            -DBSEAL_ENABLE_TEST_SEAMS=ON \
            -DBSEAL_ENABLE_QT_GUI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Configure (Debug + sanitizers)
        run: |
          cmake -S . -B build-sani \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBSEAL_BUILD_TESTS=ON \
            -DBSEAL_ENABLE_SANITIZERS=ON \
            -DBSEAL_ENABLE_TEST_SEAMS=ON \
            -DBSEAL_ENABLE_QT_GUI=ON

      - name: Build (sanitizers)
        run: cmake --build build-sani -j$(nproc)

      - name: Test (sanitizers)
        run: ctest --test-dir build-sani --output-on-failure -j$(nproc)

  # --------------------------------------------------------------------------
  # Windows: windows-latest, Release config via vcpkg static-md triplet + Qt GUI.
  # Mirrors the release.yml Windows job without the package/upload steps.
  # --------------------------------------------------------------------------
  build-windows:
    name: Build and test (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      # Pin vcpkg to a specific release tag so package versions are reproducible
      # regardless of runner image updates. The checked-out vcpkg tree is its
      # own implicit baseline — no builtin-baseline SHA in vcpkg.json is needed.
      # To update: pick a new tag from github.com/microsoft/vcpkg/releases and
      # update VCPKG_TAG here and in release.yml (both values must match).
      - name: Pin vcpkg
        shell: pwsh
        env:
          VCPKG_TAG: "2024.11.16"
        run: |
          git clone --depth 1 --branch $env:VCPKG_TAG https://github.com/microsoft/vcpkg.git C:\vcpkg-pinned
          C:\vcpkg-pinned\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg-pinned" >> $env:GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure (Release, static-md + Qt GUI)
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DBSEAL_BUILD_TESTS=ON `
            -DBSEAL_ENABLE_TEST_SEAMS=ON `
            -DBSEAL_ENABLE_QT_GUI=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

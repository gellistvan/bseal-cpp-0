name: Release

# Triggers only on version tags pushed to the repo.
# Pattern covers: v0.1.0  v1.2.3  v1.2.3-rc1  v2.0.0-beta.2
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Minimal default: no write access to any resource.
# The release job overrides this to contents: write.
permissions:
  contents: read

jobs:

  # --------------------------------------------------------------------------
  # Linux build: ubuntu-latest, Release config, .deb via CPack.
  # apt package versions are pinned to the ubuntu-24.04 image snapshot;
  # they advance only when GitHub updates the runner image.
  # --------------------------------------------------------------------------
  build-linux:
    name: Build and test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config \
            libsodium-dev libssl-dev \
            qt6-base-dev \
            dpkg-dev

      - name: Configure (Release)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBSEAL_ENABLE_INSTALL=ON \
            -DBSEAL_BUILD_TESTS=ON \
            -DBSEAL_ENABLE_QT_GUI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Package (.deb)
        run: cd build && cpack

      - name: Upload Linux artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: linux-package
          path: build/*.deb
          if-no-files-found: error
          retention-days: 1

  # --------------------------------------------------------------------------
  # Windows build: windows-latest (Server 2022), Release config, .zip via CPack.
  #
  # Dependencies via vcpkg, bootstrapped from a pinned tag (see "Pin vcpkg" step).
  # Triplet x64-windows-static-md: static libs, dynamic CRT (/MD). Required for
  # Qt compatibility — Qt is built with /MD and cannot mix with /MT.
  # Qt itself is installed via jurplel/install-qt-action (pre-built binaries).
  # windeployqt bundles Qt DLLs into the install tree during cmake install.
  #
  # libsodium is found via vcpkg's unofficial-sodium CMake config (not
  # pkg-config), so no pkg-config installation is required on Windows.
  # --------------------------------------------------------------------------
  build-windows:
    name: Build and test (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      # Pin vcpkg to a specific release tag. See ci.yml Windows job for update
      # instructions. VCPKG_TAG must match the value in ci.yml.
      - name: Pin vcpkg
        shell: pwsh
        env:
          VCPKG_TAG: "2024.11.16"
        run: |
          git clone --depth 1 --branch $env:VCPKG_TAG https://github.com/microsoft/vcpkg.git C:\vcpkg-pinned
          C:\vcpkg-pinned\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg-pinned" >> $env:GITHUB_ENV

      # Qt is not available via vcpkg in a reasonable CI timeframe (full source
      # build). Install pre-built shared Qt6 binaries instead.
      # Triplet x64-windows-static-md is used (static libs, dynamic CRT /MD) so
      # libsodium and OpenSSL remain linkable alongside Qt, which also uses /MD.
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure (Release, static-md + Qt GUI)
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DBSEAL_ENABLE_INSTALL=ON `
            -DBSEAL_BUILD_TESTS=ON `
            -DBSEAL_ENABLE_QT_GUI=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (.zip)
        # -C Release ensures CPack picks up the Release build tree, not Debug.
        run: cd build && cpack -C Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: windows-package
          path: build\*.zip
          if-no-files-found: error
          retention-days: 1

  # --------------------------------------------------------------------------
  # Release: only runs when BOTH platform builds pass.
  # Downloads the two artifacts, computes SHA-256 checksums, and creates the
  # GitHub Release. Uses the built-in gh CLI (no third-party release action).
  # Tags containing '-' (e.g. v1.2.3-rc1) are marked as pre-releases.
  # --------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create release and upload assets
      id-token: write  # obtain OIDC token for keyless cosign signing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: artifacts/

      - name: Compute SHA-256 checksums
        # Users can verify downloads with: sha256sum --check SHA256SUMS.txt
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Keyless signing via Sigstore cosign. No stored private key is required:
      # cosign obtains a short-lived certificate from Fulcio using the GitHub
      # Actions OIDC token, then records the signing event in the public Rekor
      # transparency log. The certificate embeds the workflow identity so
      # verifiers can confirm the artifact came from this exact workflow.
      #
      # Each artifact gets two companion files:
      #   <name>.sig   – raw signature bytes (base64)
      #   <name>.pem   – short-lived Fulcio certificate (workflow identity)
      #
      # See VERIFY.md for the verification command.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd artifacts
          for f in *; do
            # Skip any .sig / .pem files already present (e.g. from a rerun)
            [[ "$f" == *.sig || "$f" == *.pem ]] && continue
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Create GitHub Release and attach artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "BSEAL ${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            artifacts/*
